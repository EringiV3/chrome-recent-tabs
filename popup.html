<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Recent Tabs Switcher - 設定</title>
    <style>
      :root {
        --bg-color: #0e0e11;
        --card-bg: rgba(22, 22, 28, 0.65);
        --border-color: rgba(255, 255, 255, 0.08);
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --accent: #a5b4fc;
        --success: #10b981;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        margin: 0;
        padding: 0;
        width: 380px;
        max-height: 580px;
        overflow-y: auto;
        background-image:
          radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(165, 180, 252, 0.05) 0%, transparent 45%);
      }

      .wrapper {
        padding: 20px;
      }

      header {
        text-align: center;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px 0;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .desc {
        font-size: 12px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.5;
      }

      .setting-group {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 20px;
      }

      .setting-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
      }

      .setting-desc {
        font-size: 11px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.4;
      }

      .val-display {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        min-width: 24px;
        text-align: right;
      }

      .slider-container {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      input[type='range'] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.1);
        outline: none;
      }

      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      }

      .btn {
        background: var(--primary);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      }

      .btn:hover {
        background: var(--primary-hover);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-main);
        box-shadow: none;
        width: auto;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .actions-footer {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .save-status {
        text-align: center;
        font-size: 12px;
        height: 16px;
        color: var(--success);
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .save-status.show {
        opacity: 1;
      }

      .layout-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .layout-option {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
      }

      .layout-option:has(input:checked) {
        border-color: rgba(99, 102, 241, 0.5);
        background: rgba(99, 102, 241, 0.08);
      }

      .layout-option input[type='radio'] {
        margin-top: 2px;
        accent-color: var(--primary);
        flex-shrink: 0;
      }

      .layout-option-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .layout-option-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
      }

      .layout-option-desc {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Recent Tabs Switcher</h1>
        <p class="desc">macOSのアプリ切り替えのような快適なタブ選択</p>
      </header>

      <main>
        <div class="setting-group">
          <div class="setting-card">
            <div class="setting-row">
              <label for="max-tabs">最大表示タブ数</label>
              <span class="val-display" id="max-tabs-val">9</span>
            </div>
            <p class="setting-desc">
              切り替え画面（オーバーレイ）に表示する直近開いたタブの最大数です。
            </p>
            <div class="slider-container">
              <input type="range" id="max-tabs" min="5" max="20" step="1" value="9" />
            </div>
          </div>

          <div class="setting-card">
            <div class="setting-row">
              <label>タブ一覧の表示形式</label>
            </div>
            <p class="setting-desc">切り替え画面でのタブ一覧のレイアウトを選びます。</p>
            <div class="layout-options">
              <label class="layout-option" for="layout-horizontal">
                <input type="radio" id="layout-horizontal" name="layout" value="horizontal" checked />
                <span class="layout-option-content">
                  <span class="layout-option-title">横カード</span>
                  <span class="layout-option-desc">カード形式で横並びに表示</span>
                </span>
              </label>
              <label class="layout-option" for="layout-vertical">
                <input type="radio" id="layout-vertical" name="layout" value="vertical" />
                <span class="layout-option-content">
                  <span class="layout-option-title">縦リスト</span>
                  <span class="layout-option-desc">タイトルとドメインを縦に並べた表示形式</span>
                </span>
              </label>
            </div>
          </div>

          <div class="setting-card">
            <div class="setting-row">
              <label>ショートカット設定</label>
            </div>
            <p class="setting-desc">
              デフォルトは <strong>Alt + Q</strong>（Macは <strong>Option + Q</strong>）です。
            </p>
            <button id="open-shortcut-settings" class="btn btn-secondary" type="button">
              ショートカット設定ページを開く
            </button>
          </div>
        </div>

        <div class="actions-footer">
          <button id="save-btn" class="btn" type="button">設定を保存</button>
          <div id="status" class="save-status">設定を保存しました</div>
        </div>
      </main>
    </div>
    <script src="dist/options.js"></script>
  </body>
</html>
